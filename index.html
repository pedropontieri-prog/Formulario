<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script scr="Palmeiras.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  width: 340px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

.input-group {
  margin-bottom: 15px;
}

label {
  display: block;
  margin-bottom: 5px;
  color: #555;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

input:focus, textarea:focus {
  border-color: #667eea;
  box-shadow: 0 0 5px rgba(102,126,234,0.5);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #5a67d8;
}
</style>
</head>

<body>

<div class="container">
  <h2 id="titulo">Cadastro</h2>

  <form>
    <div class="input-group">
      <label>Nome</label>
      <input type="text" placeholder="Digite seu nome" required>
    </div>

    <div class="input-group">
      <label>URL da Imagem</label>
      <input type="url" placeholder="https://exemplo.com/imagem.jpg" required>
    </div>

    <div class="input-group">
      <label>Descrição</label>
      <textarea rows="4" placeholder="Digite uma descrição..."></textarea>
    </div>

    <button type"submit">Enviar</button>
  </form>
</div>

</body>
</html>
