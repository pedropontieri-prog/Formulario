<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  width: 340px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

.input-group {
  margin-bottom: 15px;
}

label {
  display: block;
  margin-bottom: 5px;
  color: #555;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #5a67d8;
}

#resultado {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Cadastro</h2>

  <form id="meuFormulario">
    <div class="input-group">
      <label>Nome</label>
      <input type="text" name="nome" required>
    </div>

    <div class="input-group">
      <label>URL da Imagem</label>
      <input type="url" name="imagem" required>
    </div>

    <div class="input-group">
      <label>Descrição</label>
      <textarea name="descricao" rows="4"></textarea>
    </div>

    <button type="submit">Enviar</button>
  </form>

  <button type="button" onclick="alterarFundo()">Mudar fundo</button>

  <div id="resultado"></div>
</div>

<!-- JS externo -->
<script src="palmeiras.js"></script>

</body>
</html>
